<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kehadiran — Command Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #060a12;
    --bg-surface: #0c1220;
    --bg-card:    rgba(14, 20, 36, 0.85);
    --bg-input:   rgba(8, 14, 26, 0.9);

    --cyan:       #00e5cc;
    --cyan-dim:   rgba(0, 229, 204, 0.18);
    --cyan-faint: rgba(0, 229, 204, 0.06);
    --cyan-glow:  0 0 16px rgba(0, 229, 204, 0.25);

    --amber:      #f59e0b;
    --amber-dim:  rgba(245, 158, 11, 0.16);
    --amber-glow: 0 0 16px rgba(245, 158, 11, 0.3);

    --red:        #ff4060;
    --red-dim:    rgba(255, 64, 96, 0.14);

    --green:      #22c55e;
    --yellow:     #eab308;
    --blue:       #3b82f6;
    --purple:     #a855f7;

    --border:     rgba(0, 229, 204, 0.12);
    --border-hi:  rgba(0, 229, 204, 0.35);
    --text-1:     #f0f6ff;
    --text-2:     #7a8fa8;
    --text-3:     #3e526a;

    --r-sm:  8px;
    --r-md:  14px;
    --r-lg:  20px;
    --r-xl:  28px;
    --r-pill: 999px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg-deep);
    color: var(--text-1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── ANIMATED BACKGROUND ─────────────────────────────── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,229,204,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 85% 75%, rgba(245,158,11,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 50%, rgba(6,10,18,0) 0%, #060a12 100%);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: 
      linear-gradient(rgba(0,229,204,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,204,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, black 30%, transparent 100%);
  }

  /* ─── LAYOUT ───────────────────────────────────────────── */
  .shell {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "hd hd"
      "sb mn";
    gap: 0;
    min-height: 100vh;
  }

  /* ─── TOP HEADER BAR ───────────────────────────────────── */
  .top-bar {
    grid-area: hd;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(6, 10, 18, 0.9);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 200;
  }
  .top-bar-logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--cyan-dim);
    border: 1.5px solid var(--cyan);
    border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--cyan-glow);
  }
  .logo-mark svg { width: 18px; height: 18px; }
  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1rem;
    color: var(--text-1);
    letter-spacing: normal;
  }
  .logo-sub {
    font-size: 0.65rem; color: var(--text-2);
    letter-spacing: 0.04em;
  }
  .top-bar-date {
    font-size: 0.72rem; color: var(--text-2);
    letter-spacing: 0.05em;
  }
  .top-bar-date span { color: var(--cyan); font-weight: 500; }

  /* ─── SIDEBAR ──────────────────────────────────────────── */
  .sidebar {
    grid-area: sb;
    padding: 28px 20px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 20px;
    position: sticky; top: 68px;
    height: calc(100vh - 68px);
    overflow-y: auto;
    scrollbar-width: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }

  /* ─── EARNING CARD ─────────────────────────────────────── */
  .earning-card {
    background: linear-gradient(135deg, rgba(20, 28, 48, 0.9) 0%, rgba(12, 20, 36, 0.95) 100%);
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: var(--r-lg);
    padding: 22px;
    position: relative;
    overflow: hidden;
  }
  .earning-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,158,11,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .earning-label {
    font-size: 0.65rem; font-weight: 500;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .earning-label::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
    animation: pulseDot 2s infinite;
  }
  @keyframes pulseDot {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .earning-amount {
    font-family: 'DM Mono', monospace;
    font-size: 2rem; font-weight: 500;
    color: #fff;
    letter-spacing: -0.02em;
    text-shadow: var(--amber-glow);
  }
  .earning-amount .currency {
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 600;
    color: var(--amber);
    margin-right: 4px;
    vertical-align: middle;
  }
  .earning-period {
    font-size: 0.68rem; color: var(--text-2);
    margin-top: 6px; letter-spacing: 0.04em;
  }

  /* ─── STATS ROW ────────────────────────────────────────── */
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-chip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 12px;
    text-align: center;
  }
  .stat-chip .sc-val {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem; font-weight: 500;
    display: block;
    letter-spacing: -0.02em;
  }
  .stat-chip .sc-lbl {
    font-size: 0.6rem; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-top: 2px; display: block;
  }
  .stat-chip.s-green .sc-val { color: var(--green); }
  .stat-chip.s-red   .sc-val { color: var(--red); }
  .stat-chip.s-yellow .sc-val { color: var(--yellow); }
  .stat-chip.s-blue   .sc-val { color: var(--blue); }

  /* ─── SECTION LABEL ────────────────────────────────────── */
  .section-label {
    font-size: 0.6rem; font-weight: 500;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* ─── FILTER PANEL ─────────────────────────────────────── */
  .filter-group {
    display: flex; flex-direction: column; gap: 12px;
  }
  .filter-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .f-select {
    appearance: none;
    -webkit-appearance: none;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-1);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem; font-weight: 500;
    padding: 10px 12px;
    cursor: pointer;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .f-select:focus { border-color: var(--cyan); box-shadow: var(--cyan-glow); }

  /* ─── RESET BTN ────────────────────────────────────────── */
  .btn-reset {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    padding: 10px;
    background: var(--red-dim);
    border: 1px solid rgba(255, 64, 96, 0.2);
    border-radius: var(--r-sm);
    color: var(--red);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover {
    background: rgba(255,64,96,0.25);
    border-color: var(--red);
  }

  /* ─── MAIN CONTENT ─────────────────────────────────────── */
  .main {
    grid-area: mn;
    padding: 28px 28px 120px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ─── HEADER ROW ───────────────────────────────────────── */
  .col-headers {
    display: grid;
    grid-template-columns: 130px 160px 130px 200px 200px 1fr 120px 40px;
    gap: 12px;
    padding: 0 18px;
    margin-bottom: 4px;
  }
  .col-h {
    font-size: 0.57rem; font-weight: 500;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* ─── ATTENDANCE ROW ───────────────────────────────────── */
  .att-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 130px 160px 130px 200px 200px 1fr 120px 40px;
    gap: 12px;
    align-items: center;
    backdrop-filter: blur(16px);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    animation: rowIn 0.3s ease-out;
    position: relative;
    overflow: hidden;
  }
  .att-row::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    border-radius: 4px 0 0 4px;
    transition: background 0.2s;
  }
  .att-row:hover {
    border-color: var(--border-hi);
    box-shadow: var(--cyan-glow);
    transform: translateY(-1px);
  }
  .att-row.status-masuk::before   { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
  .att-row.status-libur::before   { background: var(--blue); }
  .att-row.status-izin::before    { background: var(--yellow); }
  .att-row.status-sakit::before   { background: var(--purple); }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .row-fade-out {
    opacity: 0 !important; transform: translateY(-8px) scale(0.98) !important;
    max-height: 0 !important; padding: 0 !important; margin: 0 !important;
    overflow: hidden; border: none !important;
    transition: all 0.25s ease !important;
  }

  /* ─── DAY BADGE ────────────────────────────────────────── */
  .day-badge {
    display: flex; flex-direction: column; gap: 2px;
  }
  .day-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    color: var(--cyan);
    text-shadow: var(--cyan-glow);
    letter-spacing: 0.04em;
  }
  .day-num {
    font-size: 0.62rem; color: var(--text-2);
    letter-spacing: 0.06em;
  }

  /* ─── INPUTS ───────────────────────────────────────────── */
  .c-input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-1);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem; font-weight: 400;
    padding: 9px 10px;
    width: 100%; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .c-input:focus { border-color: var(--cyan); box-shadow: var(--cyan-glow); }
  input[type="date"].c-input { font-size: 0.75rem; padding: 8px 6px; text-align: center; }
  input[type="time"].c-input { font-size: 0.78rem; text-align: center; }
  input[type="time"]::-webkit-calendar-picker-indicator,
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* ─── STATUS SELECT ────────────────────────────────────── */
  .c-select {
    appearance: none; -webkit-appearance: none;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-1);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem; font-weight: 500;
    padding: 9px 10px;
    width: 100%; cursor: pointer; outline: none;
    transition: all 0.2s;
    text-align: center;
  }
  .c-select:focus { border-color: var(--cyan); box-shadow: var(--cyan-glow); }
  .c-select.v-masuk { color: var(--green); border-color: rgba(34,197,94,0.25); background: rgba(34,197,94,0.05); }
  .c-select.v-libur  { color: var(--blue); border-color: rgba(59,130,246,0.25); background: rgba(59,130,246,0.05); }
  .c-select.v-izin   { color: var(--yellow); border-color: rgba(234,179,8,0.25); background: rgba(234,179,8,0.05); }
  .c-select.v-sakit  { color: var(--purple); border-color: rgba(168,85,247,0.25); background: rgba(168,85,247,0.05); }

  /* ─── TIME PAIR ────────────────────────────────────────── */
  .time-pair {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .time-slot { display: flex; flex-direction: column; gap: 3px; }
  .time-slot .ts-label {
    font-size: 0.56rem; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* ─── SALARY DISPLAY ───────────────────────────────────── */
  .salary-field {
    border-color: rgba(245, 158, 11, 0.2) !important;
    color: var(--amber) !important;
    background: rgba(20, 15, 6, 0.9) !important;
    font-weight: 500;
    text-align: center;
    font-size: 0.75rem !important;
  }

  /* ─── NOTES ────────────────────────────────────────────── */
  .notes-wrap { position: relative; }
  .notes-input {
    resize: none; height: 40px; line-height: 1.4;
    font-size: 0.72rem !important;
    padding: 8px 10px !important;
    overflow: hidden;
    white-space: nowrap;
  }

  /* ─── UPLOAD PROOF ─────────────────────────────────────── */
  .proof-cell {
    display: flex; align-items: center; gap: 6px;
  }
  .file-hidden { display: none; }
  .btn-upload {
    background: var(--cyan-faint);
    border: 1px dashed rgba(0,229,204,0.25);
    color: var(--cyan);
    border-radius: var(--r-sm);
    padding: 8px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    cursor: pointer; width: 100%;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-upload:hover { background: var(--cyan-dim); border-style: solid; }
  .thumb {
    width: 38px; height: 38px; border-radius: var(--r-sm);
    object-fit: cover;
    border: 1.5px solid var(--border-hi);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    flex-shrink: 0;
  }
  .thumb:hover { transform: scale(1.1); box-shadow: var(--cyan-glow); }

  /* ─── DELETE BTN ───────────────────────────────────────── */
  .btn-del {
    width: 36px; height: 36px;
    background: var(--red-dim);
    border: 1px solid rgba(255,64,96,0.15);
    border-radius: var(--r-sm);
    color: var(--red);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-del:hover { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-del svg { width: 15px; height: 15px; }

  /* ─── FAB ──────────────────────────────────────────────── */
  .fab {
    position: fixed; bottom: 28px; right: 28px; z-index: 500;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #0d9488, #065f46);
    border: 1.5px solid var(--cyan);
    box-shadow: 0 8px 24px rgba(0,229,204,0.25), var(--cyan-glow);
    color: #fff;
    padding: 14px 24px;
    border-radius: var(--r-pill);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    animation: fabPulse 3s infinite;
  }
  .fab:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 32px rgba(0,229,204,0.4); }
  .fab svg { width: 18px; height: 18px; }
  @keyframes fabPulse {
    0%,100% { box-shadow: 0 8px 24px rgba(0,229,204,0.2), var(--cyan-glow); }
    50%      { box-shadow: 0 12px 28px rgba(0,229,204,0.4), 0 0 28px rgba(0,229,204,0.3); }
  }

  /* ─── LIGHTBOX ─────────────────────────────────────────── */
  .lightbox {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(6, 10, 18, 0.95);
    backdrop-filter: blur(12px);
    display: none; align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 85vh;
    border-radius: var(--r-lg);
    border: 1.5px solid var(--border-hi);
    box-shadow: var(--cyan-glow);
  }

  /* ─── EMPTY STATE ──────────────────────────────────────── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
  }

  /* ─── SCROLLBAR ────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

  /* ─── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 1100px) {
    .shell { grid-template-columns: 1fr; grid-template-areas: "hd" "sb" "mn"; }
    .sidebar { position: static; height: auto; padding: 20px 16px; border-right: none; border-bottom: 1px solid var(--border); }
    .col-headers { display: none; }
    .att-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      gap: 12px;
      padding: 16px;
    }
    .att-row::before { width: 100%; height: 3px; top: 0; left: 0; bottom: auto; right: 0; border-radius: 14px 14px 0 0; }
    .time-pair { grid-template-columns: 1fr 1fr; }
    .btn-del { width: 100%; height: 40px; }
    .fab { right: 16px; bottom: 16px; padding: 12px 18px; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>

<!-- FAB -->
<div class="fab" onclick="tambahBaris()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Tambah Hari
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="tutupLightbox()">
  <img id="lb-img" src="" alt="Bukti Absen">
</div>

<div class="shell">

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="top-bar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00e5cc" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">ABSENSI</div>
        <div class="logo-sub">Data Kehadiran Kerja</div>
      </div>
    </div>
    <div class="top-bar-date">Rekap real-time · <span id="hdr-period">—</span></div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Earnings -->
    <div class="earning-card">
      <div class="earning-label" id="earn-label">Total Pendapatan</div>
      <div class="earning-amount">
        <span class="currency">Rp</span><span id="grand-total">0</span>
      </div>
      <div class="earning-period" id="earn-period">—</div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-chip s-green">
        <span class="sc-val" id="s-masuk">0</span>
        <span class="sc-lbl">Masuk</span>
      </div>
      <div class="stat-chip s-red">
        <span class="sc-val" id="s-absen">0</span>
        <span class="sc-lbl">Absen</span>
      </div>
      <div class="stat-chip s-yellow">
        <span class="sc-val" id="s-izin">0</span>
        <span class="sc-lbl">Izin</span>
      </div>
      <div class="stat-chip s-blue">
        <span class="sc-val" id="s-libur">0</span>
        <span class="sc-lbl">Libur</span>
      </div>
    </div>

    <!-- Filter -->
    <div class="section-label">Filter Periode</div>
    <div class="filter-group">
      <div class="filter-grid">
        <select id="filter-month" class="f-select" onchange="renderTabel()">
          <option value="ALL">Semua Bulan</option>
          <option value="01">Januari</option><option value="02">Februari</option>
          <option value="03">Maret</option><option value="04">April</option>
          <option value="05">Mei</option><option value="06">Juni</option>
          <option value="07">Juli</option><option value="08">Agustus</option>
          <option value="09">September</option><option value="10">Oktober</option>
          <option value="11">November</option><option value="12">Desember</option>
        </select>
        <select id="filter-year" class="f-select" onchange="renderTabel()"></select>
      </div>
    </div>

    <!-- Reset -->
    <div class="section-label">Aksi</div>
    <button class="btn-reset" onclick="resetData()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.52"/>
      </svg>
      Reset Semua Data
    </button>

  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Column headers -->
    <div class="col-headers">
      <div class="col-h">Hari</div>
      <div class="col-h">Tanggal</div>
      <div class="col-h">Status</div>
      <div class="col-h">Jam Masuk / Keluar</div>
      <div class="col-h">Catatan</div>
      <div class="col-h">Gaji Harian</div>
      <div class="col-h">Bukti</div>
      <div class="col-h"></div>
    </div>

    <!-- Rows injected here -->
    <div id="rows" style="display:contents"></div>
  </main>

</div>

<script>
/* ─── CONSTANTS ─────────────────────────────────── */
const HARI = ["MINGGU","SENIN","SELASA","RABU","KAMIS","JUMAT","SABTU"];
const BULAN_NAMA = ["","Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
const GAJI = 272900;
const STORAGE_KEY = "db_attendance_desktop_ultimate_v500";

/* ─── STORAGE ───────────────────────────────────── */
function baca() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function tulis(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
function makeID() { return '_' + Math.random().toString(36).substr(2, 9); }

/* ─── RUPIAH ────────────────────────────────────── */
function rp(n) {
  return Number(n).toLocaleString('id-ID');
}

/* ─── INIT ──────────────────────────────────────── */
window.onload = function() {
  // Populate year select
  const sel = document.getElementById('filter-year');
  for (let i = 0; i <= 20; i++) {
    const y = 2026 + i;
    const o = document.createElement('option');
    o.value = String(y); o.textContent = String(y);
    if (y === 2026) o.selected = true;
    sel.appendChild(o);
  }
  document.getElementById('filter-month').value = "ALL";

  let db = baca();
  if (db.length === 0) {
    db.push(buatLog("2026-06-01"));
    tulis(db);
  }
  renderTabel();
};

function buatLog(tanggal) {
  const d = new Date(tanggal + 'T00:00:00');
  return { id: makeID(), hari: HARI[d.getDay()], tanggal, status: "-", masuk: "", keluar: "", catatan: "", gaji: 0, foto: "" };
}

/* ─── ADD ROW ───────────────────────────────────── */
function tambahBaris() {
  let db = baca();
  let nextDate;
  if (db.length > 0) {
    db.sort((a, b) => a.tanggal.localeCompare(b.tanggal));
    const last = db[db.length - 1];
    const parts = last.tanggal.split('-');
    const d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
    d.setDate(d.getDate() + 1);
    nextDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  } else {
    nextDate = "2026-06-01";
  }
  db.push(buatLog(nextDate));
  tulis(db);
  renderTabel();
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 50);
}

/* ─── RENDER ────────────────────────────────────── */
function renderTabel() {
  const container = document.getElementById('rows');
  const bulan = document.getElementById('filter-month').value;
  const tahun = document.getElementById('filter-year').value;

  let db = baca();
  db.sort((a, b) => a.tanggal.localeCompare(b.tanggal));

  let totalGaji = 0, cMasuk = 0, cAbsen = 0, cIzin = 0, cLibur = 0;
  const filtered = db.filter(item => {
    const [y, m] = item.tanggal.split('-');
    return y === tahun && (bulan === "ALL" || m === bulan);
  });

  filtered.forEach(item => {
    totalGaji += Number(item.gaji) || 0;
    if (item.status === "MASUK") cMasuk++;
    else if (item.status === "LIBUR") cLibur++;
    else if (item.status === "IZIN") cIzin++;
    else if (item.status === "-" || item.status === "SAKIT") cAbsen++;
  });

  // Update header period
  let periodTxt = bulan === "ALL" ? `Tahun ${tahun}` : `${BULAN_NAMA[parseInt(bulan,10)]} ${tahun}`;
  document.getElementById('hdr-period').textContent = periodTxt;
  document.getElementById('earn-label').textContent = `Total Pendapatan · ${periodTxt}`;
  document.getElementById('earn-period').textContent = `${filtered.length} hari tercatat · ${cMasuk} hari kerja aktif`;
  document.getElementById('grand-total').textContent = rp(totalGaji);
  document.getElementById('s-masuk').textContent = cMasuk;
  document.getElementById('s-absen').textContent = cAbsen;
  document.getElementById('s-izin').textContent  = cIzin;
  document.getElementById('s-libur').textContent = cLibur;

  // Render rows
  container.innerHTML = '';
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">Tidak ada data untuk periode ini</div>`;
    return;
  }
  filtered.forEach(item => renderBaris(item, container));
}

function renderBaris(item, container) {
  const d = new Date(item.tanggal + 'T00:00:00');
  const tglFmt = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  const statusClass = {
    'MASUK': 'v-masuk status-masuk',
    'LIBUR': 'v-libur status-libur',
    'IZIN':  'v-izin status-izin',
    'SAKIT': 'v-sakit status-sakit',
    '-':     ''
  }[item.status] || '';

  const row = document.createElement('div');
  row.className = `att-row ${statusClass.includes('status') ? statusClass.split(' ').find(c=>c.startsWith('status')) : ''}`;
  row.dataset.id = item.id;

  row.innerHTML = `
    <!-- DAY -->
    <div class="day-badge">
      <div class="day-name">${item.hari}</div>
      <div class="day-num">${tglFmt}</div>
    </div>

    <!-- DATE -->
    <input type="date" class="c-input" value="${item.tanggal}"
      onchange="ubahTanggal('${item.id}', this)">

    <!-- STATUS -->
    <select class="c-select ${statusClass.split(' ')[0]}" onchange="ubahStatus('${item.id}', this)">
      <option value="-"     ${item.status==='-'    ?'selected':''}>—</option>
      <option value="MASUK" ${item.status==='MASUK' ?'selected':''}>MASUK</option>
      <option value="LIBUR" ${item.status==='LIBUR' ?'selected':''}>LIBUR</option>
      <option value="IZIN"  ${item.status==='IZIN'  ?'selected':''}>IZIN</option>
      <option value="SAKIT" ${item.status==='SAKIT' ?'selected':''}>SAKIT</option>
    </select>

    <!-- TIME -->
    <div class="time-pair">
      <div class="time-slot">
        <span class="ts-label">Masuk</span>
        <input type="time" class="c-input" value="${item.masuk}" onchange="autoSave('${item.id}')">
      </div>
      <div class="time-slot">
        <span class="ts-label">Keluar</span>
        <input type="time" class="c-input" value="${item.keluar}" onchange="autoSave('${item.id}')">
      </div>
    </div>

    <!-- NOTES -->
    <input type="text" class="c-input notes-input" value="${item.catatan || ''}"
      placeholder="Catatan..." onchange="autoSave('${item.id}')">

    <!-- SALARY -->
    <input type="text" class="c-input salary-field" readonly
      value="${item.gaji > 0 ? 'Rp ' + rp(item.gaji) : '—'}" id="gaji-${item.id}">

    <!-- PROOF -->
    <div class="proof-cell">
      <input type="file" accept="image/*,image/heic,image/heif,.heic,.heif,.jpg,.jpeg,.png,.gif,.webp,.bmp,.tiff,.tif,.avif,.jfif" class="file-hidden" id="file-${item.id}"
        onchange="uploadFoto('${item.id}', this)">
      <label for="file-${item.id}" class="btn-upload">
        ${item.foto ? '↺ Ganti' : '+ Bukti'}
      </label>
      ${item.foto ? `<img class="thumb" src="${item.foto}" alt="Bukti"
        onclick="bukaLightbox('${item.id}')">` : ''}
    </div>

    <!-- DELETE -->
    <button class="btn-del" onclick="hapusBaris('${item.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>
  `;
  container.appendChild(row);
}

/* ─── MUTATIONS ─────────────────────────────────── */
function ubahTanggal(id, el) {
  let db = baca();
  const item = db.find(r => r.id === id);
  if (!item) return;
  const d = new Date(el.value + 'T00:00:00');
  item.tanggal = el.value;
  item.hari = HARI[d.getDay()];
  tulis(db);
  renderTabel();
}

function ubahStatus(id, el) {
  let db = baca();
  const item = db.find(r => r.id === id);
  if (!item) return;
  item.status = el.value;
  item.gaji = el.value === "MASUK" ? GAJI : 0;
  tulis(db);
  renderTabel();
}

function autoSave(id) {
  const row = document.querySelector(`[data-id="${id}"]`);
  if (!row) return;
  const inputs = row.querySelectorAll('input:not([type="file"])');
  let db = baca();
  const item = db.find(r => r.id === id);
  if (!item) return;
  // masuk (time), keluar (time), catatan (text) — order in DOM
  // We target by type
  const times = row.querySelectorAll('input[type="time"]');
  const notes = row.querySelector('input[type="text"]');
  if (times[0]) item.masuk   = times[0].value;
  if (times[1]) item.keluar  = times[1].value;
  if (notes)    item.catatan = notes.value;
  tulis(db);
}

function uploadFoto(id, el) {
  const file = el.files[0];
  if (!file) return;

  // Untuk format yang browser support langsung (jpg, png, webp, gif, bmp, svg, avif, dll)
  const isHeic = file.type === 'image/heic' || file.type === 'image/heif'
    || file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');

  function simpanFoto(dataUrl) {
    let db = baca();
    const item = db.find(r => r.id === id);
    if (!item) return;
    item.foto = dataUrl;
    tulis(db);
    renderTabel();
  }

  if (isHeic) {
    // HEIC: load via URL.createObjectURL lalu gambar ke canvas → export sebagai JPEG
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = img.naturalWidth  || img.width;
      canvas.height = img.naturalHeight || img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      URL.revokeObjectURL(url);
      simpanFoto(dataUrl);
    };
    img.onerror = () => {
      // Fallback: simpan langsung jika browser mendukung
      URL.revokeObjectURL(url);
      const reader = new FileReader();
      reader.onload = e => simpanFoto(e.target.result);
      reader.readAsDataURL(file);
    };
    img.src = url;
  } else {
    // Format standar: baca langsung sebagai base64
    const reader = new FileReader();
    reader.onload = e => simpanFoto(e.target.result);
    reader.readAsDataURL(file);
  }
}

function hapusBaris(id) {
  const row = document.querySelector(`[data-id="${id}"]`);
  if (row) {
    row.classList.add('row-fade-out');
    setTimeout(() => {
      let db = baca().filter(r => r.id !== id);
      tulis(db);
      renderTabel();
    }, 250);
  }
}

function resetData() {
  if (!confirm("Yakin reset semua data? Tindakan ini tidak dapat dibatalkan.")) return;
  localStorage.removeItem(STORAGE_KEY);
  renderTabel();
}

/* ─── LIGHTBOX ──────────────────────────────────── */
function bukaLightbox(id) {
  const db = baca();
  const item = db.find(r => r.id === id);
  if (!item || !item.foto) return;
  document.getElementById('lb-img').src = item.foto;
  document.getElementById('lightbox').classList.add('open');
}
function tutupLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
</script>
