<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catatan Tabungan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  padding: 36px 16px 64px;
  display: flex; flex-direction: column; align-items: center;
  position: relative; overflow-x: hidden;
  color: #1e293b;
}

/* BG */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #dbeafe 0%, #ede9fe 50%, #d1fae5 100%);
  overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.50;
  animation: drift linear infinite;
}
.o1{width:500px;height:500px;background:#bfdbfe;top:-120px;left:-80px;animation-duration:20s}
.o2{width:380px;height:380px;background:#c4b5fd;bottom:-80px;right:-60px;animation-duration:26s;animation-delay:-8s}
.o3{width:280px;height:280px;background:#a7f3d0;top:45%;left:62%;animation-duration:22s;animation-delay:-14s}
@keyframes drift{0%{transform:translate(0,0)}33%{transform:translate(28px,-22px)}66%{transform:translate(-18px,30px)}100%{transform:translate(0,0)}}

/* Glass */
.glass {
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  border: 1.5px solid rgba(255,255,255,0.88);
  border-radius: 22px;
  box-shadow: 0 8px 40px rgba(99,102,241,0.09), 0 2px 6px rgba(0,0,0,0.04);
}

.wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 700px;
  display: flex; flex-direction: column; gap: 18px;
}

/* Header */
.header { text-align: center; padding: 30px 24px 24px; }
.header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.header h1 span {
  background: linear-gradient(90deg,#6366f1,#10b981);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header p { margin-top: 5px; font-size: 13px; color: #64748b; font-weight: 500; }

/* Saldo */
.saldo-card { padding: 26px 24px 22px; text-align: center; }
.saldo-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #6366f1; margin-bottom: 8px; }
.saldo-amount { font-size: clamp(28px,6vw,46px); font-weight: 800; letter-spacing: -0.03em; color: #1e293b; }
.saldo-amount.bump { animation: bump .25s ease; }
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.saldo-count { font-size: 12px; color: #94a3b8; font-weight: 500; margin-top: 4px; }

/* Section label */
.sec-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: #94a3b8; margin-bottom: 14px;
}

/* Card padding */
.pad { padding: 24px; }

/* Field */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.10em;
  text-transform: uppercase; color: #94a3b8;
}
.field input, .field select {
  padding: 10px 13px;
  border-radius: 12px;
  border: 1.5px solid rgba(99,102,241,0.18);
  background: rgba(255,255,255,0.80);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; font-weight: 600; color: #1e293b;
  outline: none; width: 100%;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus, .field select:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.11);
}
.field input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
@media(max-width:520px){ .grid-2,.grid-3{grid-template-columns:1fr} }

/* Rekening list */
.rek-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.rek-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1.5px solid rgba(99,102,241,0.14);
  background: rgba(255,255,255,0.70);
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
.rek-item:hover { border-color: rgba(99,102,241,0.35); background: rgba(255,255,255,0.90); }
.rek-item.active { border-color: #6366f1; background: rgba(99,102,241,0.06); }
.rek-radio {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid #c7d2fe;
  flex-shrink: 0; transition: border-color .2s;
  display: flex; align-items: center; justify-content: center;
}
.rek-item.active .rek-radio { border-color: #6366f1; }
.rek-radio-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #6366f1; opacity: 0; transition: opacity .2s;
}
.rek-item.active .rek-radio-dot { opacity: 1; }
.rek-info { flex: 1; }
.rek-bank { font-size: 13px; font-weight: 700; color: #1e293b; }
.rek-no   { font-size: 12px; font-weight: 600; color: #64748b; letter-spacing: 0.04em; }
.rek-name { font-size: 11.5px; color: #94a3b8; font-weight: 500; }
.btn-del-rek {
  font-size: 11px; font-weight: 700; color: #e11d48;
  background: rgba(244,63,94,0.08); border: none;
  padding: 4px 9px; border-radius: 7px; cursor: pointer;
  font-family: inherit; transition: background .15s; flex-shrink: 0;
}
.btn-del-rek:hover{ background: rgba(244,63,94,0.16); }

/* Add rekening toggle */
.add-rek-toggle {
  display: flex; align-items: center; gap: 7px;
  font-size: 12.5px; font-weight: 700; color: #6366f1;
  cursor: pointer; width: fit-content;
  background: rgba(99,102,241,0.08);
  padding: 8px 14px; border-radius: 10px;
  border: none; font-family: inherit;
  transition: background .15s;
}
.add-rek-toggle:hover { background: rgba(99,102,241,0.14); }

.add-rek-form {
  margin-top: 14px;
  padding: 18px;
  border-radius: 16px;
  background: rgba(255,255,255,0.55);
  border: 1.5px solid rgba(99,102,241,0.14);
  display: none;
}
.add-rek-form.open { display: block; }

/* Buttons */
.btn {
  padding: 11px 20px;
  border-radius: 13px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px; font-weight: 700;
  border: none; cursor: pointer;
  transition: opacity .18s, transform .14s;
  letter-spacing: 0.01em;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: linear-gradient(135deg,#6366f1,#818cf8);
  color: #fff;
  box-shadow: 0 4px 16px rgba(99,102,241,0.28);
}
.btn-primary:hover { opacity: .88; }
.btn-success {
  background: linear-gradient(135deg,#10b981,#34d399);
  color: #fff;
  box-shadow: 0 3px 12px rgba(16,185,129,0.24);
}
.btn-success:hover { opacity: .88; }
.btn-sm { padding: 8px 15px; font-size: 12.5px; border-radius: 10px; }
.btn-ghost {
  background: rgba(255,255,255,0.7);
  color: #64748b;
  border: 1.5px solid rgba(100,116,139,0.18);
}
.btn-ghost:hover { background: rgba(255,255,255,0.95); }
.btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

/* Table */
.table-panel { overflow: hidden; padding: 0; }
.table-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px 14px;
  border-bottom: 1px solid rgba(99,102,241,0.08);
  flex-wrap: wrap; gap: 10px;
}
.table-top-title { font-size: 14px; font-weight: 700; }
.tbl-wrap { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: rgba(99,102,241,0.05); }
th {
  padding: 10px 14px; text-align: left;
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase; color: #94a3b8;
  white-space: nowrap;
}
th.r, td.r { text-align: right; }
th.c, td.c { text-align: center; }

tbody tr {
  border-bottom: 1px solid rgba(99,102,241,0.06);
  animation: fadeUp .22s ease both;
  transition: background .14s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(99,102,241,0.04); }
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

td { padding: 12px 14px; color: #334155; font-weight: 500; vertical-align: middle; }
.td-nom { font-weight: 700; color: #059669; }
.btn-del {
  background: rgba(244,63,94,0.09); color: #e11d48;
  border: none; padding: 4px 9px; border-radius: 7px;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: background .14s;
}
.btn-del:hover { background: rgba(244,63,94,0.17); }

.empty { text-align: center; padding: 44px 20px; color: #cbd5e1; }
.empty p { font-size: 13px; font-weight: 600; }

/* Toast */
#toast {
  position: fixed; bottom: 26px; right: 18px;
  background: rgba(30,41,59,0.90); color: #fff;
  padding: 11px 18px; border-radius: 12px;
  font-size: 13px; font-weight: 600;
  pointer-events: none; opacity: 0; transform: translateY(10px);
  transition: opacity .22s, transform .22s; z-index: 9999;
  backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.10);
}
#toast.show { opacity: 1; transform: translateY(0); }

/* Divider */
.divider { height: 1px; background: rgba(99,102,241,0.10); margin: 16px 0; }
</style>
</head>
<body>

<div class="bg">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<div class="wrap">

  <!-- Header -->
  <div class="glass header">
    <h1>Buku <span>Tabungan</span></h1>
    <p>Catat tabungan dan kelola rekening bank kamu.</p>
  </div>

  <!-- Saldo -->
  <div class="glass saldo-card">
    <div class="saldo-label">Total Saldo</div>
    <div class="saldo-amount" id="saldo">Rp 0</div>
    <div class="saldo-count" id="saldoCount">0 catatan</div>
  </div>

  <!-- Rekening -->
  <div class="glass pad">
    <div class="sec-label">Rekening Tersimpan</div>
    <div class="rek-list" id="rekList"></div>

    <button class="add-rek-toggle" id="toggleAddRek" onclick="toggleRekForm()">+ Tambah Rekening Baru</button>

    <div class="add-rek-form" id="addRekForm">
      <div class="grid-3" style="margin-bottom:12px">
        <div class="field">
          <label>Nama Bank</label>
          <input type="text" id="rBank" placeholder="BCA, BRI, Mandiri..." />
        </div>
        <div class="field">
          <label>Nomor Rekening</label>
          <input type="text" id="rNo" placeholder="1234567890" inputmode="numeric" />
        </div>
        <div class="field">
          <label>Nama Rekening</label>
          <input type="text" id="rName" placeholder="Nama pemilik" />
        </div>
      </div>
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-primary btn-sm" onclick="saveRek()">Simpan Rekening</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleRekForm()">Batal</button>
      </div>
    </div>
  </div>

  <!-- Form Tabungan -->
  <div class="glass pad">
    <div class="sec-label">Tambah Catatan</div>
    <div class="grid-2" style="margin-bottom:12px">
      <div class="field">
        <label>Tanggal</label>
        <input type="date" id="fDate" />
      </div>
      <div class="field">
        <label>Nominal</label>
        <input type="text" id="fNominal" placeholder="Rp 0" inputmode="numeric" />
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="addEntry()">Simpan Tabungan</button>
  </div>

  <!-- Table -->
  <div class="glass table-panel">
    <div class="table-top">
      <span class="table-top-title">Riwayat Tabungan</span>
      <button class="btn btn-success btn-sm" onclick="exportExcel()">Download Excel</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Tanggal</th>
            <th>Bulan</th>
            <th>Tahun</th>
            <th>Bank</th>
            <th>No. Rekening</th>
            <th>Nama Rekening</th>
            <th class="r">Nominal</th>
            <th class="c">Hapus</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const KEY_DATA = 'nabung_v2_data';
const KEY_REK  = 'nabung_v2_rek';
const BULAN = ['','Januari','Februari','Maret','April','Mei','Juni',
               'Juli','Agustus','September','Oktober','November','Desember'];

let data      = [];
let rekenings = [];
let selectedRekId = null;

/* ── Init ── */
(function(){
  try{ data      = JSON.parse(localStorage.getItem(KEY_DATA)) || []; }catch{ data=[]; }
  try{ rekenings = JSON.parse(localStorage.getItem(KEY_REK))  || []; }catch{ rekenings=[]; }

  if(rekenings.length) selectedRekId = rekenings[0].id;

  const now = new Date();
  document.getElementById('fDate').value = toDateInput(now);

  renderRek();
  render();
})();

/* ── Helpers ── */
function toDateInput(d){
  return d.toISOString().slice(0,10);
}
function toRupiah(n){ return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function parseNom(s){ return parseInt((s+'').replace(/[^\d]/g,'')) || 0; }

function saveData(){ localStorage.setItem(KEY_DATA, JSON.stringify(data)); }
function saveRekData(){ localStorage.setItem(KEY_REK, JSON.stringify(rekenings)); }

/* ── Auto-format nominal ── */
document.getElementById('fNominal').addEventListener('input', function(){
  const n = parseNom(this.value);
  this.value = n > 0 ? toRupiah(n) : '';
});

/* ── Rekening ── */
function toggleRekForm(){
  const f = document.getElementById('addRekForm');
  f.classList.toggle('open');
  if(f.classList.contains('open')){
    document.getElementById('rBank').focus();
  } else {
    document.getElementById('rBank').value = '';
    document.getElementById('rNo').value   = '';
    document.getElementById('rName').value = '';
  }
}

function saveRek(){
  const bank = document.getElementById('rBank').value.trim();
  const no   = document.getElementById('rNo').value.trim();
  const name = document.getElementById('rName').value.trim();
  if(!bank) return toast('Nama bank wajib diisi.');
  if(!no)   return toast('Nomor rekening wajib diisi.');
  if(!name) return toast('Nama rekening wajib diisi.');

  const rek = { id: Date.now(), bank, no, name };
  rekenings.push(rek);
  saveRekData();

  if(!selectedRekId) selectedRekId = rek.id;

  renderRek();
  toggleRekForm();
  toast('Rekening berhasil disimpan.');
}

function deleteRek(id){
  if(!confirm('Hapus rekening ini?')) return;
  rekenings = rekenings.filter(r => r.id !== id);
  saveRekData();
  if(selectedRekId === id){
    selectedRekId = rekenings.length ? rekenings[0].id : null;
  }
  renderRek();
  toast('Rekening dihapus.');
}

function selectRek(id){
  selectedRekId = id;
  renderRek();
}

function renderRek(){
  const el = document.getElementById('rekList');
  if(!rekenings.length){
    el.innerHTML = '<p style="font-size:13px;color:#94a3b8;font-weight:500;padding:4px 0">Belum ada rekening tersimpan. Tambah rekening dulu.</p>';
    return;
  }
  el.innerHTML = rekenings.map(r => `
    <div class="rek-item${r.id === selectedRekId ? ' active' : ''}" onclick="selectRek(${r.id})">
      <div class="rek-radio"><div class="rek-radio-dot"></div></div>
      <div class="rek-info">
        <div class="rek-bank">${esc(r.bank)}</div>
        <div class="rek-no">${esc(r.no)}</div>
        <div class="rek-name">${esc(r.name)}</div>
      </div>
      <button class="btn-del-rek" onclick="event.stopPropagation();deleteRek(${r.id})">Hapus</button>
    </div>`).join('');
}

/* ── Add Entry ── */
function addEntry(){
  const dateVal = document.getElementById('fDate').value;
  const nom     = parseNom(document.getElementById('fNominal').value);

  if(!dateVal)   return toast('Tanggal wajib dipilih.');
  if(nom <= 0)   return toast('Nominal harus diisi.');
  if(!selectedRekId && rekenings.length === 0) return toast('Tambah rekening terlebih dahulu.');
  if(!selectedRekId) return toast('Pilih rekening terlebih dahulu.');

  const rek = rekenings.find(r => r.id === selectedRekId);
  const [y, m, d] = dateVal.split('-').map(Number);

  data.push({
    id:   Date.now(),
    date: dateVal,
    tgl:  d, bln: m, thn: y,
    nom,
    rekId:   rek.id,
    rekBank: rek.bank,
    rekNo:   rek.no,
    rekName: rek.name
  });

  data.sort((a,b) => a.date.localeCompare(b.date));
  saveData();
  document.getElementById('fNominal').value = '';
  render();
  toast('Tabungan berhasil disimpan.');
}

/* ── Delete Entry ── */
function del(id){
  data = data.filter(e => e.id !== id);
  saveData();
  render();
  toast('Catatan dihapus.');
}

/* ── Render ── */
function render(){
  const total = data.reduce((s,e) => s+e.nom, 0);
  const sEl   = document.getElementById('saldo');
  sEl.textContent = toRupiah(total);
  sEl.classList.remove('bump');
  void sEl.offsetWidth;
  sEl.classList.add('bump');
  document.getElementById('saldoCount').textContent = `${data.length} catatan`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if(!data.length){
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty"><p>Belum ada catatan tabungan.</p></div></td></tr>';
    return;
  }

  data.forEach((e,i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:#94a3b8;font-size:11.5px">${i+1}</td>
      <td>${String(e.tgl).padStart(2,'0')}</td>
      <td>${BULAN[e.bln]}</td>
      <td>${e.thn}</td>
      <td style="font-weight:700">${esc(e.rekBank)}</td>
      <td style="letter-spacing:0.04em">${esc(e.rekNo)}</td>
      <td>${esc(e.rekName)}</td>
      <td class="r td-nom">${toRupiah(e.nom)}</td>
      <td class="c"><button class="btn-del" onclick="del(${e.id})">Hapus</button></td>`;
    tbody.appendChild(tr);
  });
}

/* ── Export Excel ── */
function exportExcel(){
  if(!data.length) return toast('Belum ada data untuk diekspor.');
  const total = data.reduce((s,e)=>s+e.nom,0);
  const rows = [
    ['CATATAN TABUNGAN'],
    [`Diekspor: ${new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}`],
    [],
    ['No','Tanggal','Bulan','Tahun','Nama Bank','No. Rekening','Nama Rekening','Nominal (Rp)'],
    ...data.map((e,i)=>[
      i+1,
      String(e.tgl).padStart(2,'0'),
      BULAN[e.bln], e.thn,
      e.rekBank, e.rekNo, e.rekName, e.nom
    ]),
    [],
    ['','','','','','','Total Saldo', total]
  ];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:5},{wch:9},{wch:12},{wch:7},{wch:14},{wch:16},{wch:20},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws, 'Tabungan');
  XLSX.writeFile(wb, `catatan_tabungan_${new Date().getFullYear()}.xlsx`);
  toast('File Excel berhasil diunduh.');
}

/* ── Utils ── */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let tt;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(()=>el.classList.remove('show'), 2500);
}
</script>
<div style="position:relative;z-index:1;text-align:center;padding:16px;font-size:12px;color:#94a3b8;font-weight:500;">
  &copy; 2026 Copyright By Adrian Maulana.
</div>
</body>
</html>
